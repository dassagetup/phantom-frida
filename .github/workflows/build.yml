name: Build Custom Frida for Emulator

on:
  workflow_dispatch:
    inputs:
      frida_version:
        description: 'Frida version'
        required: true
        default: '17.7.2'
      custom_name:
        description: 'Custom name'
        required: true
        default: 'ajeossida'
      arch:
        description: 'Emulator Arch'
        required: true
        default: 'android-x86_64'
        type: choice
        options:
          - android-x86_64
          - android-arm64

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dependencies
        shell: powershell
        run: |
          # Verify Python and Git are available
          python --version
          git --version

      - name: Download NDK
        shell: powershell
        run: |
          if (!(Test-Path "build")) { New-Item -ItemType Directory -Path "build" }
          if (!(Test-Path "build/android-ndk-r29")) {
            Invoke-WebRequest -Uri "https://dl.google.com/android/repository/android-ndk-r29-linux.zip" -OutFile "build/ndk.zip"
            Expand-Archive -Path "build/ndk.zip" -DestinationPath "build/"
            Move-Item -Path "build/android-ndk-r29*" -Destination "build/android-ndk-r29"
            Remove-Item "build/ndk.zip"
          }

      - name: Build and Patch
        shell: powershell
        run: |
          # Clone Frida source
          if (!(Test-Path "build/frida")) {
            git clone --recurse-submodules --branch ${{ inputs.frida_version }} --depth 1 https://github.com/frida/frida.git build/frida
          }
          
          # Execute build script
          python build.py --version ${{ inputs.frida_version }} `
            --name ${{ inputs.custom_name }} `
            --arch ${{ inputs.arch }} `
            --skip-clone --ndk-path build/android-ndk-r29 `
            --extended --verify

      - name: Upload Frida Server
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.custom_name }}-server-${{ inputs.arch }}
          path: output/*server*
          retention-days: 7
