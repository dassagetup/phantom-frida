name: Build Custom Frida for Emulator

on:
  workflow_dispatch:
    inputs:
      frida_version:
        description: 'Frida version'
        required: true
        default: '17.7.2'
      custom_name:
        description: 'Custom name'
        required: true
        default: 'ajeossida'
      arch:
        description: 'Emulator Arch'
        required: true
        default: 'android-x86_64'
        type: choice
        options:
          - android-x86_64
          - android-arm64

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dependencies
        shell: powershell
        run: |
          # Verify Python and Git are available
          python --version
          git --version

      - name: Download NDK
        shell: powershell
        run: |
          if (Test-Path "build") { Remove-Item -Path "build" -Recurse -Force }
          New-Item -ItemType Directory -Path "build"
          
          # 2. Download
          Invoke-WebRequest -Uri "https://dl.google.com/android/repository/android-ndk-r29-linux.zip" -OutFile "build/ndk.zip"
          
          # 3. Use Expand-Archive with -Force to overwrite/ensure clean extraction
          Expand-Archive -Path "build/ndk.zip" -DestinationPath "build/" -Force
          
          # 4. Rename: Ensure we find the folder regardless of exact naming (NDK folders often have version suffixes)
          $ndkDir = Get-ChildItem -Path "build" -Directory | Where-Object { $_.Name -like "android-ndk-r29*" }
          Rename-Item -Path $ndkDir.FullName -NewName "android-ndk-r29"
          
          # 5. Cleanup zip
          Remove-Item "build/ndk.zip"

      - name: Build and Patch
        shell: powershell
        run: |
          # Clone Frida source
          if (!(Test-Path "build/frida")) {
            git clone --recurse-submodules --branch ${{ inputs.frida_version }} --depth 1 https://github.com/frida/frida.git build/frida
          }
          
          # Execute build script
          python build.py --version ${{ inputs.frida_version }} `
            --name ${{ inputs.custom_name }} `
            --arch ${{ inputs.arch }} `
            --skip-clone --ndk-path build/android-ndk-r29 `
            --extended --verify

      - name: Upload Frida Server
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.custom_name }}-server-${{ inputs.arch }}
          path: output/*server*
          retention-days: 7
