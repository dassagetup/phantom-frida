name: Build Custom Frida for Emulator

on:
  workflow_dispatch:
    inputs:
      frida_version:
        description: 'Frida version (e.g. 17.7.2)'
        required: true
        default: '17.7.2'
      custom_name:
        description: 'Custom name'
        required: true
        default: 'ajeossida'
      arch:
        description: 'Target Architecture'
        required: true
        default: 'android-arm64'
        type: choice
        options:
          - android-arm64
          - android-arm
          - android-x86_64
          - android-x86
      extended:
        description: 'Enable extended anti-detection'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System info
        run: |
          echo "=== Ubuntu Environment ==="
          uname -a
          python3 --version
          git --version
          echo "CPU cores: $(nproc)"
          echo "Free disk: $(df -h / | tail -1 | awk '{print $4}')"

      - name: Install dependencies
        run: |
          set -e
          echo "=== Updating package manager ==="
          sudo apt-get update -qq
          
          echo "=== Installing build tools ==="
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            git \
            python3 \
            python3-pip \
            unzip \
            wget \
            pkg-config \
            libglib2.0-dev \
            libjson-glib-dev
          
          echo "=== Dependency installation complete ==="

      - name: Setup build directory
        run: |
          set -e
          echo "=== Preparing build environment ==="
          
          if [ -d "build" ]; then
            echo "Removing existing build directory..."
            rm -rf build
          fi
          
          mkdir -p build
          cd build
          pwd
          echo "=== Build directory ready ==="

      - name: Download Android NDK r29
        run: |
          set -e
          echo "=== Downloading Android NDK r29 (Linux) ==="
          cd build
          
          NDK_URL="https://dl.google.com/android/repository/android-ndk-r29-linux.zip"
          NDK_FILE="android-ndk-r29-linux.zip"
          
          if [ ! -f "$NDK_FILE" ]; then
            echo "Fetching NDK (~1.5 GB, may take 5-10 minutes)..."
            curl -L -o "$NDK_FILE" "$NDK_URL"
            echo "Download complete"
          else
            echo "NDK already exists, skipping download"
          fi
          
          echo "=== Extracting NDK ==="
          unzip -q "$NDK_FILE"
          rm "$NDK_FILE"
          
          if [ -d "android-ndk-r29" ]; then
            echo "✓ NDK extracted successfully"
          else
            echo "ERROR: NDK extraction failed"
            exit 1
          fi
          
          echo "=== NDK ready ==="

      - name: Run build.py
        run: |
          set -e
          cd "${{ github.workspace }}"
          pwd
          
          echo "=== Starting Frida build process ==="
          python3 build.py \
            --version "${{ inputs.frida_version }}" \
            --name "${{ inputs.custom_name }}" \
            --arch "${{ inputs.arch }}" \
            --work-dir ./build \
            --output-dir ./output \
            --ndk-path ./build/android-ndk-r29 \
            --extended=${{ inputs.extended }} \
            --verify
          
          echo "✓ Build complete"

      - name: Verify Output
        if: always()
        run: |
          if [ -d "output" ]; then
            echo "=== Output artifacts ==="
            ls -lh output/
            du -sh output/*
          else
            echo "WARNING: Output directory not found"
            exit 1
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ${{ inputs.custom_name }}-${{ inputs.arch }}
          path: output/
          retention-days: 7
          if-no-files-found: error
