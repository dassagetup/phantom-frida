name: Build Custom Frida for Emulator

on:
  workflow_dispatch:
    inputs:
      frida_version:
        description: 'Frida version'
        required: true
        default: '17.7.2'
      custom_name:
        description: 'Custom name'
        required: true
        default: 'ajeossida'
      arch:
        description: 'Emulator Arch'
        required: true
        default: 'android-x86_64'
        type: choice
        options:
          - android-x86_64
          - android-arm64

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dependencies
        shell: powershell
        run: |
          python --version
          git --version

      - name: Download and Extract NDK
        shell: powershell
        run: |
          # 1. Clean start
          if (Test-Path "build") { Remove-Item -Path "build" -Recurse -Force }
          New-Item -ItemType Directory -Path "build"
          
          # 2. Download
          $wc = New-Object System.Net.WebClient
          $wc.DownloadFile("https://dl.google.com/android/repository/android-ndk-r29-linux.zip", "build/ndk.zip")
          
          # 3. Robust Extraction using Shell.Application (prevents path errors)
          $shell = New-Object -ComObject Shell.Application
          $zipFile = Get-Item "build/ndk.zip"
          $destination = Get-Item "build"
          $shell.NameSpace($destination.FullName).CopyHere($shell.NameSpace($zipFile.FullName).Items())
          
          # 4. Rename: Ensure we find the folder regardless of exact naming
          $ndkDir = Get-ChildItem -Path "build" -Directory | Where-Object { $_.Name -like "android-ndk-r29*" }
          Rename-Item -Path $ndkDir.FullName -NewName "android-ndk-r29"
          
          # 5. Cleanup zip
          Remove-Item "build/ndk.zip"

      - name: Build and Patch
        shell: powershell
        run: |
          # Clone Frida source
          if (!(Test-Path "build/frida")) {
            git clone --recurse-submodules --branch ${{ inputs.frida_version }} --depth 1 https://github.com/frida/frida.git build/frida
          }
          
          # Execute build script
          # Note: Backticks (`) are the correct line-continuation character in PowerShell
          python build.py --version ${{ inputs.frida_version }} `
            --name ${{ inputs.custom_name }} `
            --arch ${{ inputs.arch }} `
            --skip-clone --ndk-path "$PWD/build/android-ndk-r29" `
            --extended --verify

      - name: Upload Frida Server
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.custom_name }}-server-${{ inputs.arch }}
          path: output/*server*
          retention-days: 7
