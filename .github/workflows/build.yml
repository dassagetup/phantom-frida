name: Build Custom Frida for Emulator

on:
  workflow_dispatch:
    inputs:
      frida_version:
        description: 'Frida version (e.g. 16.7.19)'
        required: true
        default: '16.7.19'
      custom_name:
        description: 'Custom name'
        required: true
        default: 'ajeossida'
      arch:
        description: 'Target Architecture'
        required: true
        default: 'android-arm64'
        type: choice
        options:
          - android-arm64
          - android-arm
          - android-x86_64
          - android-x86

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System info
        shell: bash
        run: |
          echo "=== WSL/Linux Environment ==="
          uname -a
          python3 --version
          git --version
          echo "CPU cores: $(nproc)"
          echo "Free disk: $(df -h / | tail -1 | awk '{print $4}')"

      - name: Install dependencies (WSL)
        shell: bash
        run: |
          set -e
          echo "=== Updating package manager ==="
          sudo apt-get update -qq
          
          echo "=== Installing build tools ==="
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            git \
            python3 \
            python3-pip \
            unzip \
            wget
          
          echo "=== Dependency installation complete ==="

      - name: Setup build directory
        shell: bash
        run: |
          set -e
          echo "=== Preparing build environment ==="
          
          # Clean and create build directory
          if [ -d "build" ]; then
            echo "Removing existing build directory..."
            rm -rf build
          fi
          
          mkdir -p build
          cd build
          pwd
          echo "=== Build directory ready ==="

      - name: Download NDK (Linux version for WSL)
        shell: bash
        run: |
          set -e
          echo "=== Downloading Android NDK r29 (Linux) ==="
          cd build
          
          NDK_URL="https://dl.google.com/android/repository/android-ndk-r29-linux.zip"
          NDK_FILE="android-ndk-r29-linux.zip"
          
          if [ ! -f "$NDK_FILE" ]; then
            echo "Fetching NDK (~1.5 GB, may take 5-10 minutes)..."
            curl -L -o "$NDK_FILE" "$NDK_URL"
            echo "Download complete"
          else
            echo "NDK already exists, skipping download"
          fi
          
          echo "=== Extracting NDK ==="
          unzip -q "$NDK_FILE"
          rm "$NDK_FILE"
          
          # Verify extraction
          if [ -d "android-ndk-r29" ]; then
            echo "✓ NDK extracted successfully"](#)
