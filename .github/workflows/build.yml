name: Build Custom Frida for Emulator

on:
  workflow_dispatch:
    inputs:
      frida_version:
        description: 'Frida version'
        required: true
        default: '17.7.2'
      custom_name:
        description: 'Custom name'
        required: true
        default: 'ajeossida'
      arch:
        description: 'Emulator Arch (x86_64 for standard emulators, arm64 for Apple Silicon/Advanced)'
        required: true
        default: 'android-x86_64'
        type: choice
        options:
          - android-x86_64
          - android-arm64

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Runner Environment (CRITICAL)
        shell: bash
        run: |
          if [[ "$OSTYPE" == "linux-gnu"* ]]; then
            # Keep all original cleanup and swap logic for Linux/VM runners
            sudo apt-get purge -y azure-cli google-chrome-stable firefox powershell || true
            sudo apt-get autoremove -y || true
            sudo fallocate -l 10G /swapfile || true
            sudo chmod 600 /swapfile || true
            sudo mkswap /swapfile || true
            sudo swapon /swapfile || true
          else
            echo "Running on Windows: Skipping Linux-specific system tuning."
          fi

      - name: Install dependencies
        shell: bash
        run: |
          if [[ "$OSTYPE" == "linux-gnu"* ]]; then
            sudo apt-get update && sudo apt-get install -y build-essential curl git python3 unzip
          else
            echo "Assuming dependencies are pre-installed on Windows host."
          fi

      - name: Cache NDK
        uses: actions/cache@v4
        id: ndk-cache
        with:
          path: build/android-ndk-r29
          key: ndk-r29-linux

      - name: Download NDK
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p build
          curl -L -o build/ndk.zip https://dl.google.com/android/repository/android-ndk-r29-linux.zip
          cd build && unzip -q ndk.zip && mv android-ndk-r29* android-ndk-r29 && rm ndk.zip

      - name: Build and Patch
        shell: bash
        run: |
          # Keep original logic
          git clone --recurse-submodules --branch ${{ inputs.frida_version }} --depth 1 https://github.com/frida/frida.git build/frida
          
          python3 build.py --version ${{ inputs.frida_version }} \
            --name ${{ inputs.custom_name }} \
            --arch ${{ inputs.arch }} \
            --skip-clone --ndk-path build/android-ndk-r29 \
            --extended --verify -v

      - name: Upload Frida Server
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.custom_name }}-server-${{ inputs.arch }}
          path: output/*server*
          retention-days: 7
