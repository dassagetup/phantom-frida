name: Build Custom Frida for Emulator

on:
  workflow_dispatch:
    inputs:
      frida_version:
        description: 'Frida version'
        required: true
        default: '17.7.2'
      custom_name:
        description: 'Custom name'
        required: true
        default: 'ajeossida'
      arch:
        description: 'Emulator Arch'
        required: true
        default: 'android-x86_64'
        type: choice
        options:
          - android-x86_64
          - android-arm64

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dependencies
        shell: pwsh
        run: |
          python --version
          git --version
          echo "Environment setup complete"

      - name: Download and Extract NDK
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          
          Write-Output "Step 1: Clean start"
          if (Test-Path "build") { Remove-Item -Recurse -Force "build" }
          New-Item -ItemType Directory -Path "build" -Force | Out-Null
          
          Write-Output "Step 2: Download Windows NDK (~1.5 GB)"
          Set-Location "build"
          Invoke-WebRequest -Uri "https://dl.google.com/android/repository/android-ndk-r29-windows-x86_64.zip" `
            -OutFile "ndk.zip" -UseBasicParsing
          Write-Output "NDK download complete"
          
          Write-Output "Step 3: Extract NDK"
          Expand-Archive -Path "ndk.zip" -DestinationPath "." -Force
          Write-Output "NDK extraction complete"
          
          Write-Output "Step 4: Verify extraction and rename if needed"
          if (Test-Path "android-ndk-r29") {
            Write-Output "NDK already in correct location"
          } else {
            $ndk_dir = Get-ChildItem -Filter "android-ndk-r29*" -Directory | Select-Object -First 1
            if ($ndk_dir) {
              Rename-Item -Path $ndk_dir.FullName -NewName "android-ndk-r29"
              Write-Output "Renamed NDK folder"
            } else {
              Write-Output "ERROR: NDK folder not found after extraction"
              Get-ChildItem -Force
              exit 1
            }
          }
          
          Write-Output "Step 5: Cleanup and verify"
          Remove-Item -Force "ndk.zip"
          Write-Output "Removed NDK zip file"
          
          if (Test-Path "android-ndk-r29") {
            Write-Output "NDK verification: OK"
            Get-ChildItem "android-ndk-r29" | Select-Object -First 10
          } else {
            Write-Output "ERROR: NDK verification failed"
            exit 1
          }
          
          Set-Location ".."

      - name: Build and Patch
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          
          Write-Output "Step 1: Clone Frida source"
          if (-not (Test-Path "build/frida")) {
            Write-Output "Cloning Frida ${{ inputs.frida_version }} (this may take several minutes)..."
            git clone --recurse-submodules --branch "${{ inputs.frida_version }}" --depth 1 `
              "https://github.com/frida/frida.git" "build/frida"
            Write-Output "Clone complete"
          } else {
            Write-Output "Using existing Frida source"
          }
          
          Write-Output "Step 2: Execute build script"
          $ndk_path = "$(Get-Location)\build\android-ndk-r29"
          python3 build.py `
            --version "${{ inputs.frida_version }}" `
            --name "${{ inputs.custom_name }}" `
            --arch "${{ inputs.arch }}" `
            --skip-clone `
            --ndk-path "$ndk_path" `
            --extended `
            --verify

      - name: Verify Output
        shell: pwsh
        run: |
          Write-Output "Checking output artifacts..."
          if (Test-Path "output") {
            Get-ChildItem -Path "output" -Recurse | 
              ForEach-Object { if ($_.PSIsContainer) { "{0} ({1})" -f $_.FullName, (Get-ChildItem $_.FullName -Recurse | Measure-Object -Property Length -Sum).Sum } }
          } else {
            Write-Output "Warning: Output directory not found"
          }

      - name: Upload Frida Server
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ${{ inputs.custom_name }}-server-${{ inputs.arch }}
          path: output/*server*
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Frida Gadget
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ${{ inputs.custom_name }}-gadget-${{ inputs.arch }}
          path: output/*gadget*
          retention-days: 7
          if-no-files-found: warn
