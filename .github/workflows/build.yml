name: Build Custom Frida for Emulator

on:
  workflow_dispatch:
    inputs:
      frida_version:
        description: 'Frida version'
        required: true
        default: '17.7.2'
      custom_name:
        description: 'Custom name'
        required: true
        default: 'ajeossida'
      arch:
        description: 'Emulator Arch'
        required: true
        default: 'android-x86_64'
        type: choice
        options:
          - android-x86_64
          - android-arm64

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dependencies
        shell: bash
        run: |
          python --version
          git --version
          echo "Environment setup complete"

      - name: Download and Extract NDK
        shell: bash
        run: |
          set -e
          
          echo "Step 1: Clean start"
          rm -rf build
          mkdir -p build
          
          echo "Step 2: Download Windows NDK (~1.5 GB)"
          cd build
          curl -L -o ndk.zip "https://dl.google.com/android/repository/android-ndk-r29-windows-x86_64.zip"
          echo "NDK download complete"
          
          echo "Step 3: Extract NDK"
          unzip -q ndk.zip
          echo "NDK extraction complete"
          
          echo "Step 4: Verify extraction and rename if needed"
          if [ -d "android-ndk-r29" ]; then
            echo "NDK already in correct location"
          else
            # Find the actual NDK directory
            ndk_dir=$(find . -maxdepth 1 -type d -name "android-ndk-r29*" | head -1)
            if [ -n "$ndk_dir" ]; then
              mv "$ndk_dir" android-ndk-r29
              echo "Renamed NDK folder"
            else
              echo "ERROR: NDK folder not found after extraction"
              ls -la
              exit 1
            fi
          fi
          
          echo "Step 5: Cleanup and verify"
          rm -f ndk.zip
          echo "Removed NDK zip file"
          
          if [ -d "android-ndk-r29" ]; then
            echo "NDK verification: OK"
            ls -la android-ndk-r29 | head -10
          else
            echo "ERROR: NDK verification failed"
            exit 1
          fi
          
          cd ..

      - name: Build and Patch
        shell: bash
        run: |
          set -e
          
          echo "Step 1: Clone Frida source"
          if [ ! -d "build/frida" ]; then
            echo "Cloning Frida ${{ inputs.frida_version }} (this may take several minutes)..."
            git clone --recurse-submodules --branch ${{ inputs.frida_version }} --depth 1 \
              https://github.com/frida/frida.git build/frida
            echo "Clone complete"
          else
            echo "Using existing Frida source"
          fi
          
          echo "Step 2: Execute build script"
          python3 build.py \
            --version "${{ inputs.frida_version }}" \
            --name "${{ inputs.custom_name }}" \
            --arch "${{ inputs.arch }}" \
            --skip-clone \
            --ndk-path "$(pwd)/build/android-ndk-r29" \
            --extended \
            --verify

      - name: Verify Output
        shell: bash
        run: |
          echo "Checking output artifacts..."
          if [ -d "output" ]; then
            du -sh output/*
          else
            echo "Warning: Output directory not found"
          fi

      - name: Upload Frida Server
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ${{ inputs.custom_name }}-server-${{ inputs.arch }}
          path: output/*server*
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Frida Gadget
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ${{ inputs.custom_name }}-gadget-${{ inputs.arch }}
          path: output/*gadget*
          retention-days: 7
          if-no-files-found: warn
